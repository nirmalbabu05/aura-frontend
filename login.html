<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aura Admin Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700&display=swap" rel="stylesheet">
    <style> body { font-family: 'Outfit', sans-serif; } </style>
</head>
<body class="bg-gray-100 h-screen flex items-center justify-center">
    <div class="bg-white p-10 rounded-2xl shadow-2xl w-full max-w-md border-t-8 border-[#0f766e]">
        <h1 class="text-3xl font-bold text-gray-800 mb-2">Admin Login</h1>
        <p class="text-gray-500 text-sm mb-8 font-medium italic">Aura Holidays Control Panel</p>
        
        <form onsubmit="handleLogin(event)" class="space-y-6">
            <input type="text" id="user" placeholder="Username" class="w-full p-4 border border-gray-200 rounded-lg outline-none focus:ring-2 focus:ring-[#0f766e]" required>
            <input type="password" id="pass" placeholder="Password" class="w-full p-4 border border-gray-200 rounded-lg outline-none focus:ring-2 focus:ring-[#0f766e]" required>
            <button type="submit" class="w-full bg-[#0f766e] text-white p-4 rounded-lg font-bold hover:bg-teal-800 transition shadow-lg">ENTER DASHBOARD</button>
        </form>
        <p id="error-msg" class="text-red-500 text-center mt-4 hidden">Invalid Credentials!</p>
    </div>

    <script>
        async function handleLogin(e) {
            e.preventDefault();
            const username = document.getElementById('user').value;
            const password = document.getElementById('pass').value;

            try {
                const response = await fetch('https://aura-holidays-api.onrender.com/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();
                if (data.success) {
                    localStorage.setItem('isAdminLoggedIn', 'true');
                    window.location.href = 'admin.html';
                } else {
                    document.getElementById('error-msg').classList.remove('hidden');
                }
            } catch (err) { alert("API Connection Error!"); }
        }
    </script>
</body>
</html>
