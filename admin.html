<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aura Admin Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style> body { font-family: 'Outfit', sans-serif; background-color: #f1f5f9; } </style>
</head>
<body class="p-6 md:p-10">

    <div class="max-w-4xl mx-auto space-y-8">
        <div class="bg-white p-8 rounded-2xl shadow-xl border border-gray-100">
            <div class="flex items-center justify-between mb-8 border-b pb-6">
                <div class="flex items-center gap-4">
                    <div class="w-12 h-12 bg-[#0f766e] text-white rounded-full flex items-center justify-center text-xl font-bold">A</div>
                    <div>
                        <h1 class="text-3xl font-extrabold text-gray-800">Aura Admin Panel</h1>
                        <p class="text-sm text-gray-500 font-medium">Add Real-World Tour Packages.</p>
                    </div>
                </div>
                <button onclick="handleLogout()" class="bg-red-50 text-red-600 hover:bg-red-500 hover:text-white px-6 py-2 rounded-lg text-sm font-bold uppercase tracking-widest transition">Logout</button>
            </div>

            <form id="add-package-form" class="space-y-6" onsubmit="addPackage(event)">
                <div class="grid grid-cols-2 gap-6">
                    <div><label class="block text-xs font-bold text-gray-500 uppercase mb-2">Destination</label><input type="text" id="dest" class="w-full border p-3 rounded bg-gray-50 outline-none focus:border-[#0f766e]" required></div>
                    <div><label class="block text-xs font-bold text-gray-500 uppercase mb-2">Package Title</label><input type="text" id="title" class="w-full border p-3 rounded bg-gray-50 outline-none focus:border-[#0f766e]" required></div>
                </div>
                <div class="grid grid-cols-3 gap-6">
                    <div><label class="block text-xs font-bold text-gray-500 uppercase mb-2">Duration</label><input type="text" id="duration" class="w-full border p-3 rounded bg-gray-50 outline-none focus:border-[#0f766e]" required></div>
                    <div><label class="block text-xs font-bold text-gray-500 uppercase mb-2">Price (₹)</label><input type="text" id="price" class="w-full border p-3 rounded bg-gray-50 outline-none focus:border-[#0f766e]" required></div>
                    <div>
                        <label class="block text-xs font-bold text-gray-500 uppercase mb-2">Category</label>
                        <select id="category" class="w-full border p-3 rounded bg-gray-50 outline-none focus:border-[#0f766e]" required>
                            <option value="Group Tours">Group Tours</option>
                            <option value="Honeymoon">Honeymoon</option>
                            <option value="Adventure">Adventure</option>
                            <option value="Family">Family</option>
                        </select>
                    </div>
                </div>
                
                <div><label class="block text-xs font-bold text-gray-500 uppercase mb-2">Image Keyword</label><input type="text" id="image" class="w-full border p-3 rounded bg-gray-50 outline-none focus:border-[#0f766e]" required></div>
                <div><label class="block text-xs font-bold text-gray-500 uppercase mb-2">Inclusions (Comma separated)</label><input type="text" id="inclusions" placeholder="e.g., Flights, 4-Star Hotel, Breakfast" class="w-full border p-3 rounded bg-gray-50 outline-none focus:border-[#0f766e]"></div>
                <div><label class="block text-xs font-bold text-gray-500 uppercase mb-2">Short Overview</label><textarea id="overview" rows="2" class="w-full border p-3 rounded bg-gray-50 outline-none focus:border-[#0f766e]"></textarea></div>
                <div><label class="block text-xs font-bold text-gray-500 uppercase mb-2">Daily Itinerary</label><textarea id="itinerary" rows="4" placeholder="Day 1: Arrival at airport...&#10;Day 2: City Sightseeing..." class="w-full border p-3 rounded bg-gray-50 outline-none focus:border-[#0f766e]"></textarea></div>
                
                <button type="submit" id="submit-btn" class="w-full bg-[#0f766e] text-white font-bold uppercase tracking-widest p-4 rounded hover:bg-teal-800 transition shadow-lg mt-4">➕ Save Package</button>
                <div id="status-msg" class="text-center font-bold text-sm mt-4 hidden"></div>
            </form>
        </div>

        <div class="bg-white p-8 rounded-2xl shadow-xl border border-gray-100 overflow-x-auto">
            <h2 class="text-2xl font-extrabold text-gray-800 mb-6 border-b pb-4">Manage Packages</h2>
            <table class="w-full text-left border-collapse">
                <thead><tr class="text-xs uppercase tracking-widest text-gray-500 bg-gray-50"><th class="p-4 border-b">ID</th><th class="p-4 border-b">Title</th><th class="p-4 border-b">Category</th><th class="p-4 border-b text-center">Action</th></tr></thead>
                <tbody id="packages-list" class="text-sm text-gray-700"><tr><td colspan="4" class="p-4 text-center">Loading...</td></tr></tbody>
            </table>
        </div>
    </div>

    <script>
        const API_BASE_URL = "https://aura-holidays-api.onrender.com"; 
        
        if (localStorage.getItem('isAdminLoggedIn') !== 'true') window.location.href = 'login.html';
        function handleLogout() { localStorage.removeItem('isAdminLoggedIn'); window.location.href = 'login.html'; }

        let editingPackageId = null;
        let globalAdminPackages = []; // 🌟 PUDHU LOGIC: Store packages in memory

        async function addPackage(e) {
            e.preventDefault();
            const btn = document.getElementById('submit-btn');
            const msg = document.getElementById('status-msg');
            msg.classList.add('hidden'); btn.innerText = "⏳ SAVING..."; btn.disabled = true;
            
            const packageData = {
                destination: document.getElementById('dest').value,
                title: document.getElementById('title').value,
                duration: document.getElementById('duration').value,
                price: document.getElementById('price').value,
                image: document.getElementById('image').value,
                category: document.getElementById('category').value,
                inclusions: document.getElementById('inclusions').value,
                overview: document.getElementById('overview').value,
                itinerary: document.getElementById('itinerary').value
            };

            const isEditing = editingPackageId !== null;
            const endpoint = isEditing ? `${API_BASE_URL}/api/packages/${editingPackageId}` : `${API_BASE_URL}/api/packages`;
            
            try {
                const response = await fetch(endpoint, { 
                    method: isEditing ? 'PUT' : 'POST', 
                    headers: { 'Content-Type': 'application/json' }, 
                    body: JSON.stringify(packageData) 
                });
                const data = await response.json();
                if(response.ok) {
                    msg.innerText = "✅ " + data.message; 
                    msg.className = "text-center font-bold text-sm mt-4 text-green-600 block";
                    document.getElementById('add-package-form').reset(); 
                    editingPackageId = null; 
                    btn.innerText = "➕ Save Package"; 
                    btn.classList.replace('bg-blue-600', 'bg-[#0f766e]');
                    loadAllPackages(); // Reloads fresh data from server
                } else throw new Error("Failed");
            } catch (error) {
                msg.innerText = "❌ Network Error!"; 
                msg.className = "text-center font-bold text-sm mt-4 text-red-600 block";
            } finally { 
                if(!editingPackageId) btn.innerText = "➕ Save Package"; 
                btn.disabled = false; 
            }
        }

        // 🌟 PUDHU LOGIC: Simple and Bulletproof Edit Function
        function setupEdit(id) {
            // Find the exact package from our memory using ID
            const p = globalAdminPackages.find(pkg => pkg.id === id);
            if(!p) return;
            
            document.getElementById('dest').value = p.destination || ''; 
            document.getElementById('title').value = p.title || '';
            document.getElementById('duration').value = p.duration || ''; 
            document.getElementById('price').value = p.price || '';
            document.getElementById('image').value = p.image || ''; 
            document.getElementById('category').value = p.category || 'General';
            document.getElementById('inclusions').value = p.inclusions || ''; 
            document.getElementById('overview').value = p.overview || '';
            document.getElementById('itinerary').value = p.itinerary || '';
            
            editingPackageId = id;
            const btn = document.getElementById('submit-btn'); 
            btn.innerText = "🔄 Update Package";
            btn.classList.remove('bg-[#0f766e]'); 
            btn.classList.add('bg-blue-600');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        async function loadAllPackages() {
            try {
                const response = await fetch(`${API_BASE_URL}/api/packages/all`);
                globalAdminPackages = await response.json(); // Save to memory
                
                const listEl = document.getElementById('packages-list');
                if(globalAdminPackages.length === 0) { 
                    listEl.innerHTML = `<tr><td colspan="4" class="p-4 text-center text-gray-400">Database is empty.</td></tr>`; 
                    return; 
                }
                
                let html = '';
                globalAdminPackages.forEach(p => {
                    const safeTitle = p.title.replace(/'/g, "\\'"); // Only escape title for delete prompt
                    
                    // Notice how setupEdit now ONLY takes the ID
                    html += `<tr class="border-b hover:bg-gray-50 transition">
                        <td class="p-4 font-bold text-gray-400">#${p.id}</td>
                        <td class="p-4 font-semibold">${p.title}</td>
                        <td class="p-4"><span class="bg-teal-100 text-teal-800 text-xs font-bold px-2 py-1 rounded">${p.category || 'General'}</span></td>
                        <td class="p-4 text-center flex justify-center gap-2">
                            <button onclick="setupEdit(${p.id})" class="bg-blue-500 hover:bg-blue-700 text-white px-3 py-1.5 rounded text-xs font-bold transition">Edit</button>
                            <button onclick="deletePackage(${p.id}, '${safeTitle}')" class="bg-red-500 hover:bg-red-700 text-white px-3 py-1.5 rounded text-xs font-bold transition">Delete</button>
                        </td></tr>`;
                });
                listEl.innerHTML = html;
            } catch (error) { 
                document.getElementById('packages-list').innerHTML = `<tr><td colspan="4" class="p-4 text-center text-red-500">Failed to connect to Server.</td></tr>`; 
            }
        }

        async function deletePackage(id, title) {
            if(!confirm(`Delete "${title}"?`)) return;
            try {
                const response = await fetch(`${API_BASE_URL}/api/packages/${id}`, { method: 'DELETE' });
                if(response.ok) loadAllPackages();
            } catch (error) { alert("❌ Network Error!"); }
        }

        window.addEventListener('DOMContentLoaded', loadAllPackages);
    </script>
</body>
</html>
